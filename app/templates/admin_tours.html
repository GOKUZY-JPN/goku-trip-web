<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOKU TRIP Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #f0f0f0; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.1rem; letter-spacing: 0.2em; color: #c9a84c; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
    .tour-card { background: #1a1a1a; border: 1px solid #2a2a2a; margin-bottom: 1.5rem; padding: 1.5rem; }
    .tour-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; cursor: pointer; }
    .tour-name { font-size: 1rem; color: #c9a84c; }
    .tour-area { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; }
    .tour-body { display: none; }
    .tour-body.open { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a84c; margin-bottom: 0.4rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.7rem 1rem;
      background: #111; border: 1px solid #333; color: #f0f0f0;
      font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .img-preview { width: 100%; height: 160px; object-fit: cover; margin-top: 0.5rem; background: #222; display: block; }
    .btn { padding: 0.7rem 1.8rem; border: none; cursor: pointer; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; transition: background 0.2s; }
    .btn-save { background: #c9a84c; color: #000; }
    .btn-save:hover { background: #e8d5a3; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; background: #c9a84c; color: #000; font-size: 0.8rem; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>GOKU TRIP — Tour Management</h1>
    <a href="/" style="color:#666;font-size:0.8rem;text-decoration:none;">← Back to Site</a>
  </header>

  <div class="container">
    <div id="toursList"></div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script>
    const TOKEN = 'gokutrip-admin';
    let tours = [];

    async function loadTours() {
      const res = await fetch(`/admin/tours_detail?token=${TOKEN}`);
      tours = await res.json();
      render();
    }

    function render() {
      const container = document.getElementById('toursList');
      container.innerHTML = tours.map((t, i) => `
        <div class="tour-card">
          <div class="tour-header" onclick="toggle(${i})">
            <div>
              <div class="tour-name">${t.name}</div>
              <div class="tour-area">${t.area} · ${t.duration_hours}hrs · ¥${t.price_per_person?.toLocaleString()}/person</div>
            </div>
            <span style="color:#666">▼</span>
          </div>
          <div class="tour-body" id="body-${i}">
            <div class="form-row">
              <div class="form-group">
                <label>Tour Name</label>
                <input type="text" id="name-${i}" value="${t.name}">
              </div>
              <div class="form-group">
                <label>Area</label>
                <select id="area-${i}">
                  ${['kyoto','osaka','nara','kanazawa','himeji','uji','other'].map(a =>
                    `<option value="${a}" ${t.area===a?'selected':''}>${a}</option>`
                  ).join('')}
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Duration (hours)</label>
                <input type="number" id="duration-${i}" value="${t.duration_hours}" step="0.5">
              </div>
              <div class="form-group">
                <label>Price per person (¥)</label>
                <input type="number" id="price-${i}" value="${t.price_per_person || ''}">
              </div>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="desc-${i}">${t.description || ''}</textarea>
            </div>
            <div class="form-group">
              <label>Image URL</label>
              <input type="text" id="img-${i}" value="${t.image_url || ''}" placeholder="https://..." oninput="previewImg(${i})">
              <img class="img-preview" id="preview-${i}" src="${t.image_url || ''}" onerror="this.style.display='none'" style="${t.image_url ? '' : 'display:none'}">
            </div>
            <button class="btn btn-save" onclick="save(${i}, ${t.id})">Save Changes</button>
          </div>
        </div>
      `).join('');
    }

    function toggle(i) {
      const body = document.getElementById(`body-${i}`);
      body.classList.toggle('open');
    }

    function previewImg(i) {
      const url = document.getElementById(`img-${i}`).value;
      const img = document.getElementById(`preview-${i}`);
      if (url) { img.src = url; img.style.display = 'block'; }
      else { img.style.display = 'none'; }
    }

    async function save(i, tourId) {
      const data = {
        name: document.getElementById(`name-${i}`).value,
        area: document.getElementById(`area-${i}`).value,
        duration_hours: parseFloat(document.getElementById(`duration-${i}`).value),
        description: document.getElementById(`desc-${i}`).value,
        image_url: document.getElementById(`img-${i}`).value,
        price_per_person: parseInt(document.getElementById(`price-${i}`).value),
      };
      const res = await fetch(`/admin/tour/${tourId}?token=${TOKEN}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
      }
    }

    loadTours();
  </script>
</body>
</html>
